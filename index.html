<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TPS Challenge List</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #3a3f4b 0%, #1f2127 55%, #111217 100%);
      color: white;
      margin: 0;
      min-height: 100vh;
    }

    header {
      background: rgba(20, 22, 28, 0.95);
      padding: 22px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid #444;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 1px;
    }

    header p {
      margin: 8px 0 0;
      color: #bbb;
      font-size: 14px;
    }

    .discord-btn {
      position: absolute;
      right: 20px;
      top: 22px;
      background: #5865F2;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }

    .container {
      width: 92%;
      max-width: 1100px;
      margin: 25px auto;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    .btn {
      border: none;
      cursor: pointer;
      background: #5865F2;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }

    .btn-secondary {
      background: #36393f;
      border: 1px solid #666;
    }

    .btn:hover { opacity: 0.85; }

    .section-box {
      background: rgba(54, 57, 63, 0.95);
      border-radius: 16px;
      padding: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 25px;
    }

    .level-card {
      display: flex;
      background: rgba(64, 68, 75, 0.95);
      margin-bottom: 14px;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.15s, background 0.15s;
    }

    .level-card:hover {
      background: #4f545c;
      transform: translateY(-2px);
    }

    .thumbnail {
      width: 230px;
      min-width: 230px;
      height: 130px;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .placement {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.75);
      padding: 6px 10px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 18px;
    }

    .info {
      padding: 18px;
      flex: 1;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .creator {
      color: #ccc;
      margin-bottom: 12px;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tag {
      background: #202225;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 13px;
      color: #ddd;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 11px;
      text-align: left;
    }

    th { background: #202225; }
    tr:nth-child(even) { background: #2f3136; }
    tr:nth-child(odd) { background: #36393f; }

    tr.clickable {
      cursor: pointer;
      transition: 0.15s;
    }

    tr.clickable:hover {
      background: #4f545c;
    }

    a {
      color: #8cc8ff;
      text-decoration: none;
    }

    .empty {
      color: #aaa;
      font-style: italic;
    }

    .rank-medal {
      font-size: 18px;
      font-weight: bold;
    }

    @media (max-width: 700px) {
      header h1 { font-size: 24px; }

      .discord-btn {
        position: static;
        display: inline-block;
        margin-top: 15px;
      }

      .level-card { flex-direction: column; }

      .thumbnail {
        width: 100%;
        min-width: 100%;
      }

      table {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>TPS Challenge List</h1>
  <p>Fixed TPS Geometry Dash challenges under 30 seconds</p>
  <a class="discord-btn" href="https://discord.gg/gA5pxnNSrZ" target="_blank">Discord</a>
</header>

<div class="container">

  <div class="top-actions">
    <a class="btn" href="index.html">Challenge List</a>
    <a class="btn btn-secondary" href="https://discord.gg/gA5pxnNSrZ" target="_blank">Join Discord</a>
  </div>

  <div class="section-box">
    <h2>Challenge List</h2>
    <div id="list"></div>
  </div>

  <div class="section-box">
    <h2>Player Ranking</h2>
    <p>Points are calculated automatically from 100% records.</p>
    <div id="playerRanking"></div>
  </div>

  <div class="section-box">
    <h2>Players</h2>
    <div id="playersTable"></div>
  </div>

</div>

<script src="levels.js"></script>

<script>
const listContainer = document.getElementById("list");
const playerRanking = document.getElementById("playerRanking");
const playersTable = document.getElementById("playersTable");

function playerSlug(name) {
  return encodeURIComponent(name);
}

function rankIcon(index) {
  if (index === 0) return "🥇";
  if (index === 1) return "🥈";
  if (index === 2) return "🥉";
  return "#" + (index + 1);
}

function renderLevels() {
  listContainer.innerHTML = "";

  levels.forEach((level, index) => {
    const card = document.createElement("div");
    card.className = "level-card";

    card.innerHTML = `
      <div class="thumbnail" style="background-image:url('https://img.youtube.com/vi/${level.video}/hqdefault.jpg')">
        <div class="placement">#${index + 1}</div>
      </div>

      <div class="info">
        <div class="title">${level.name}</div>
        <div class="creator">by ${level.creator}</div>

        <div class="stats">
          <span class="tag">TPS: ${level.tps}</span>
          <span class="tag">FPS: ${level.fps}</span>
          <span class="tag">Verifier: ${level.verifier}</span>
          <span class="tag">Points: ${level.points}</span>
          <span class="tag">Records: ${level.records.length}</span>
        </div>
      </div>
    `;

    card.addEventListener("click", () => {
      window.location.href = `challenge.html?id=${level.placement}`;
    });

    listContainer.appendChild(card);
  });
}

function getPlayerData() {
  const players = {};

  levels.forEach(level => {
    level.records.forEach(record => {
      if (!players[record.player]) {
        players[record.player] = {
          name: record.player,
          points: 0,
          records: 0,
          completions: 0,
          bestPercent: 0,
          completedLevels: [],
          allRecords: []
        };
      }

      players[record.player].records += 1;

      if (record.percent > players[record.player].bestPercent) {
        players[record.player].bestPercent = record.percent;
      }

      players[record.player].allRecords.push({
        levelName: level.name,
        placement: level.placement,
        percent: record.percent,
        video: record.video,
        points: record.percent >= 100 ? Number(level.points) : 0
      });

      if (record.percent >= 100) {
        players[record.player].points += Number(level.points);
        players[record.player].completions += 1;
        players[record.player].completedLevels.push(level.name);
      }
    });
  });

  return Object.values(players);
}

function renderPlayerRanking() {
  const players = getPlayerData().sort((a, b) => {
    if (b.points !== a.points) return b.points - a.points;
    if (b.completions !== a.completions) return b.completions - a.completions;
    return b.bestPercent - a.bestPercent;
  });

  if (players.length === 0) {
    playerRanking.innerHTML = `<p class="empty">No players yet.</p>`;
    return;
  }

  playerRanking.innerHTML = `
    <table>
      <tr>
        <th>Rank</th>
        <th>Player</th>
        <th>Points</th>
        <th>Completions</th>
        <th>Records</th>
        <th>Best %</th>
      </tr>

      ${players.map((player, index) => `
        <tr class="clickable" onclick="window.location.href='player.html?name=${playerSlug(player.name)}'">
          <td class="rank-medal">${rankIcon(index)}</td>
          <td><b>${player.name}</b></td>
          <td>${player.points}</td>
          <td>${player.completions}</td>
          <td>${player.records}</td>
          <td>${player.bestPercent}%</td>
        </tr>
      `).join("")}
    </table>
  `;
}

function renderPlayersTable() {
  const players = getPlayerData().sort((a, b) => a.name.localeCompare(b.name));

  if (players.length === 0) {
    playersTable.innerHTML = `<p class="empty">No players yet.</p>`;
    return;
  }

  playersTable.innerHTML = `
    <table>
      <tr>
        <th>#</th>
        <th>Player</th>
        <th>Points</th>
        <th>Profile</th>
      </tr>

      ${players.map((player, index) => `
        <tr class="clickable" onclick="window.location.href='player.html?name=${playerSlug(player.name)}'">
          <td>#${index + 1}</td>
          <td>${player.name}</td>
          <td>${player.points}</td>
          <td>View Profile →</td>
        </tr>
      `).join("")}
    </table>
  `;
}

renderLevels();
renderPlayerRanking();
renderPlayersTable();
</script>

</body>
</html>
