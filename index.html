<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPS Challenge List</title>

  <style>
    body {font-family: Arial, sans-serif; background:#2c2f33; color:white; margin:0;}
    header {background:#23272a; padding:20px; text-align:center; font-size:28px; font-weight:bold; position:relative;}

    .discord-btn {
      position:absolute; right:20px; top:20px;
      background:#5865F2; color:white; padding:10px 15px;
      border-radius:8px; text-decoration:none; font-size:14px;
    }

    .container {width:90%; max-width:1000px; margin:20px auto;}

    .level {
      display:flex; background:#40444b; margin-bottom:10px;
      border-radius:10px; overflow:hidden; cursor:pointer;
      transition:0.2s;
    }

    .level:hover {
      background:#4f545c;
      transform:scale(1.01);
    }

    .thumbnail {width:220px; height:120px; background-size:cover; background-position:center;}
    .info {padding:15px; flex:1;}
    .title {font-size:22px; font-weight:bold;}
    .creator {font-style:italic; color:#ccc;}

    .stats {
      margin-top:10px;
      color:#ddd;
      font-size:14px;
    }

    a {color:lightblue; text-decoration:none;}

    @media(max-width:700px){
      header {font-size:22px;}
      .discord-btn {
        position:static;
        display:inline-block;
        margin-top:15px;
      }

      .level {
        flex-direction:column;
      }

      .thumbnail {
        width:100%;
      }
    }
  </style>
</head>

<body>

<header>
  TPS Challenge List
  <a class="discord-btn" href="https://discord.gg/gA5pxnNSrZ" target="_blank">Discord</a>
</header>

<div class="container" id="list"></div>

<script src="levels.js"></script>

<script>
const container = document.getElementById("list");

levels.forEach(level => {
  const div = document.createElement("div");

  div.innerHTML = `
    <div class="level" onclick="openChallenge(${level.placement})">
      <div class="thumbnail" style="background-image:url('https://img.youtube.com/vi/${level.video}/0.jpg')"></div>

      <div class="info">
        <div class="title">#${level.placement} - ${level.name}</div>
        <div class="creator">${level.creator}</div>

        <div class="stats">
          TPS: ${level.tps} · FPS: ${level.fps} · Verified by ${level.verifier}
        </div>
      </div>
    </div>
  `;

  container.appendChild(div);
});

function openChallenge(id) {
  window.location.href = `challenge.html?id=${id}`;
}
</script>

</body>
</html>
