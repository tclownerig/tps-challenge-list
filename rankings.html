<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TPS Challenge List - Player Rankings</title>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #3a3f4b 0%, #1f2127 55%, #111217 100%);
      color: white;
      margin: 0;
      min-height: 100vh;
    }
    header {
      background: rgba(20, 22, 28, 0.95);
      padding: 22px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid #444;
    }
    header h1 { margin: 0; font-size: 32px; letter-spacing: 1px; }
    header p { margin: 8px 0 0; color: #bbb; font-size: 14px; }
    .discord-btn {
      position: absolute;
      right: 20px;
      top: 22px;
      background: #5865F2;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }
    .container { width: 92%; max-width: 1100px; margin: 25px auto; }
    .top-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }
    .btn {
      border: none;
      cursor: pointer;
      background: #5865F2;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }
    .btn-secondary { background: #36393f; border: 1px solid #666; }
    .btn:hover { opacity: 0.85; }
    .section-box {
      background: rgba(54, 57, 63, 0.95);
      border-radius: 16px;
      padding: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 25px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td { padding: 11px; text-align: left; }
    th { background: #202225; }
    tr:nth-child(even) { background: #2f3136; }
    tr:nth-child(odd) { background: #36393f; }
    tr.clickable { cursor: pointer; transition: 0.15s; }
    tr.clickable:hover { background: #4f545c; }
    a { color: #8cc8ff; text-decoration: none; }
    .empty { color: #aaa; font-style: italic; }
    .rank-medal { font-size: 18px; font-weight: bold; }

    @media (max-width: 700px) {
      header h1 { font-size: 24px; }
      .discord-btn { position: static; display: inline-block; margin-top: 15px; }
      table { font-size: 13px; }
    }
  </style>
</head>

<body>

<header>
  <h1>TPS Challenge List</h1>
  <p>Player Rankings</p>
  <a class="discord-btn" href="https://discord.gg/gA5pxnNSrZ" target="_blank">Discord</a>
</header>

<div class="container">

  <div class="top-actions">
    <a class="btn btn-secondary" href="index.html">Challenge List</a>
    <a class="btn" href="rankings.html">Player Rankings</a>
    <a class="btn btn-secondary" href="players.html">Players</a>
    <a class="btn btn-secondary" href="https://discord.gg/gA5pxnNSrZ" target="_blank">Join Discord</a>
  </div>

  <div class="section-box">
    <h2>Player Rankings</h2>
    <p>Points are calculated automatically from 100% records.</p>
    <div id="playerRanking"></div>
  </div>

</div>

<script src="levels.js"></script>

<script>
const playerRanking = document.getElementById("playerRanking");

function playerSlug(name) {
  return encodeURIComponent(name);
}

function rankIcon(index) {
  if (index === 0) return "🥇";
  if (index === 1) return "🥈";
  if (index === 2) return "🥉";
  return "#" + (index + 1);
}

function getPlayerData() {
  const players = {};

  levels.forEach(level => {
    level.records.forEach(record => {
      if (!players[record.player]) {
        players[record.player] = {
          name: record.player,
          points: 0,
          records: 0,
          completions: 0,
          bestPercent: 0
        };
      }

      players[record.player].records += 1;

      if (record.percent > players[record.player].bestPercent) {
        players[record.player].bestPercent = record.percent;
      }

      if (record.percent >= 100) {
        players[record.player].points += Number(level.points);
        players[record.player].completions += 1;
      }
    });
  });

  return Object.values(players);
}

const players = getPlayerData().sort((a, b) => {
  if (b.points !== a.points) return b.points - a.points;
  if (b.completions !== a.completions) return b.completions - a.completions;
  return b.bestPercent - a.bestPercent;
});

if (players.length === 0) {
  playerRanking.innerHTML = `<p class="empty">No players yet.</p>`;
} else {
  playerRanking.innerHTML = `
    <table>
      <tr>
        <th>Rank</th>
        <th>Player</th>
        <th>Points</th>
        <th>Completions</th>
        <th>Records</th>
        <th>Best %</th>
      </tr>

      ${players.map((player, index) => `
        <tr class="clickable" onclick="window.location.href='player.html?name=${playerSlug(player.name)}'">
          <td class="rank-medal">${rankIcon(index)}</td>
          <td><b>${player.name}</b></td>
          <td>${player.points}</td>
          <td>${player.completions}</td>
          <td>${player.records}</td>
          <td>${player.bestPercent}%</td>
        </tr>
      `).join("")}
    </table>
  `;
}
</script>

</body>
</html>
