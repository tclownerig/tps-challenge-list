<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TPS Challenge List - Challenge</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #3a3f4b 0%, #1f2127 55%, #111217 100%);
      color: white;
      margin: 0;
      min-height: 100vh;
    }

    header {
      background: rgba(20, 22, 28, 0.95);
      padding: 22px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid #444;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 1px;
    }

    header p {
      margin: 8px 0 0;
      color: #bbb;
      font-size: 14px;
    }

    .discord-btn {
      position: absolute;
      right: 20px;
      top: 22px;
      background: #5865F2;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }

    .container {
      width: 92%;
      max-width: 1100px;
      margin: 25px auto;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    .btn {
      border: none;
      cursor: pointer;
      background: #5865F2;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }

    .btn-secondary {
      background: #36393f;
      border: 1px solid #666;
    }

    .btn:hover { opacity: 0.85; }

    .level-page, .rules-box {
      background: rgba(54, 57, 63, 0.95);
      border-radius: 16px;
      padding: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 25px;
    }

    .level-header {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .level-header img {
      width: 360px;
      max-width: 100%;
      border-radius: 12px;
    }

    .level-data {
      flex: 1;
      min-width: 260px;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .tag {
      background: #202225;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 13px;
      color: #ddd;
    }

    iframe {
      width: 100%;
      height: 420px;
      border: none;
      border-radius: 12px;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 11px;
      text-align: left;
    }

    th { background: #202225; }
    tr:nth-child(even) { background: #2f3136; }
    tr:nth-child(odd) { background: #36393f; }

    a {
      color: #8cc8ff;
      text-decoration: none;
    }

    .empty {
      color: #aaa;
      font-style: italic;
      margin-top: 10px;
    }

    @media (max-width: 700px) {
      header h1 { font-size: 24px; }

      .discord-btn {
        position: static;
        display: inline-block;
        margin-top: 15px;
      }

      iframe { height: 240px; }
    }
  </style>
</head>

<body>

<header>
  <h1>TPS Challenge List</h1>
  <p>Fixed TPS Geometry Dash challenges under 30 seconds</p>
  <a class="discord-btn" href="https://discord.gg/gA5pxnNSrZ" target="_blank">Discord</a>
</header>

<div class="container">

  <div class="top-actions">
    <a class="btn btn-secondary" href="index.html">← Back to List</a>
    <a class="btn btn-secondary" href="https://discord.gg/gA5pxnNSrZ" target="_blank">Join Discord</a>
  </div>

  <div id="challenge"></div>

</div>

<script src="levels.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = Number(params.get("id"));

const level = levels.find(l => l.placement === id);
const challengeContainer = document.getElementById("challenge");

if (!level) {
  challengeContainer.innerHTML = `
    <div class="level-page">
      <h2>Challenge not found</h2>
      <p>This level does not exist.</p>
    </div>
  `;
} else {
  level.records.sort((a, b) => b.percent - a.percent);

  challengeContainer.innerHTML = `
    <div class="level-page">
      <div class="level-header">
        <a href="https://www.youtube.com/watch?v=${level.video}" target="_blank">
          <img src="https://img.youtube.com/vi/${level.video}/hqdefault.jpg" alt="${level.name}">
        </a>

        <div class="level-data">
          <h2>#${level.placement} - ${level.name}</h2>
          <p><b>Creator:</b> ${level.creator}</p>
          <p><b>Verifier:</b> ${level.verifier}</p>

          <div class="stats">
            <span class="tag">TPS: ${level.tps}</span>
            <span class="tag">FPS: ${level.fps}</span>
            <span class="tag">Level ID: ${level.levelId}</span>
            <span class="tag">Points: ${level.points}</span>
            <span class="tag">Records: ${level.records.length}</span>
          </div>

          <br>
          <a class="btn" href="https://www.youtube.com/watch?v=${level.video}" target="_blank">
            Watch Verification
          </a>
        </div>
      </div>

      <iframe src="https://www.youtube.com/embed/${level.video}" allowfullscreen></iframe>

      <h2>Records</h2>

      ${
        level.records.length === 0
        ? `<p class="empty">No records submitted yet.</p>`
        : `
          <table>
            <tr>
              <th>#</th>
              <th>Player</th>
              <th>%</th>
              <th>Points</th>
              <th>Video</th>
            </tr>

            ${level.records.map((r, i) => `
              <tr>
                <td>${i + 1}</td>
                <td><a href="player.html?name=${encodeURIComponent(r.player)}">${r.player}</a></td>
                <td>${r.percent}%</td>
                <td>${r.percent >= 100 ? level.points : 0}</td>
                <td><a href="${r.video}" target="_blank">Watch</a></td>
              </tr>
            `).join("")}
          </table>
        `
      }
    </div>

    <div class="rules-box">
      <h3>Record Rules</h3>
      <ul>
        <li>Completion must be done at <b>${level.tps} TPS</b>.</li>
        <li>Small TPS margin may be allowed if approved by list staff.</li>
        <li>Video proof, clicks, Cheat Indicator, FPS and TPS are required.</li>
        <li>Only <b>100%</b> records give points in the global player ranking.</li>
        <li>Any hacked or suspicious completion may be rejected.</li>
      </ul>
    </div>
  `;
}
</script>

</body>
</html>
