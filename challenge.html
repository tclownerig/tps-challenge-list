<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TPS Challenge List - Challenge</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #3a3f4b 0%, #1f2127 55%, #111217 100%);
      color: white;
      margin: 0;
      min-height: 100vh;
    }

    header {
      background: rgba(20, 22, 28, 0.95);
      padding: 22px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid #444;
    }

    header h1 { margin: 0; font-size: 32px; }

    .discord-btn {
      position: absolute;
      right: 20px;
      top: 22px;
      background: #5865F2;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
    }

    .container {
      width: 92%;
      max-width: 1100px;
      margin: 25px auto;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    .btn {
      background: #5865F2;
      padding: 10px 16px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      font-weight: bold;
    }

    .btn-secondary {
      background: #36393f;
      border: 1px solid #666;
    }

    .level-box {
      background: rgba(54, 57, 63, 0.95);
      padding: 25px;
      border-radius: 16px;
    }

    iframe {
      width: 100%;
      height: 400px;
      border-radius: 10px;
      border: none;
      margin-top: 15px;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      text-align: left;
    }

    th { background: #202225; }
    tr:nth-child(even) { background: #2f3136; }
    tr:nth-child(odd) { background: #36393f; }
  </style>
</head>

<body>

<header>
  <h1>TPS Challenge List</h1>
  <a class="discord-btn" href="https://discord.gg/gA5pxnNSrZ" target="_blank">Discord</a>
</header>

<div class="container">

  <div class="top-actions">
    <a class="btn btn-secondary" href="index.html">Challenge List</a>
    <a class="btn btn-secondary" href="rankings.html">Player Rankings</a>
    <a class="btn btn-secondary" href="players.html">Players</a>
    <a class="btn btn-secondary" href="https://discord.gg/gA5pxnNSrZ" target="_blank">Join Discord</a>
  </div>

  <div id="challenge"></div>

</div>

<script src="levels.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = Number(params.get("id"));

const level = levels.find(l => l.placement === id);
const container = document.getElementById("challenge");

if (!level) {
  container.innerHTML = `<div class="level-box">Level not found</div>`;
} else {

  container.innerHTML = `
    <div class="level-box">
      <h2>#${level.placement} - ${level.name}</h2>
      <p>by ${level.creator} | Verified by ${level.verifier}</p>

      <iframe src="https://www.youtube.com/embed/${level.video}" allowfullscreen></iframe>

      <p><b>TPS:</b> ${level.tps}</p>
      <p><b>FPS:</b> ${level.fps}</p>
      <p><b>Points:</b> ${level.points}</p>

      <h3>Records</h3>

      ${
        level.records.length === 0
        ? "<p>No records yet.</p>"
        : `
          <table>
            <tr>
              <th>Player</th>
              <th>%</th>
              <th>Video</th>
            </tr>

            ${level.records.map(r => `
              <tr>
                <td>${r.player}</td>
                <td>${r.percent}%</td>
                <td><a href="${r.video}" target="_blank">Watch</a></td>
              </tr>
            `).join("")}
          </table>
        `
      }
    </div>
  `;
}
</script>

</body>
</html>
