<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPS Challenge List - Challenge</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background:#34373d;
      color:white;
      margin:0;
    }

    header {
      background:#23272a;
      padding:20px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
      color:#e7d6ff;
    }

    .main-list {
      background:#40444b;
      text-align:center;
      padding:12px;
      font-weight:bold;
    }

    .main-list a {
      color:white;
      text-decoration:none;
    }

    .container {
      width:90%;
      max-width:850px;
      margin:25px auto;
    }

    .box {
      background:#40444b;
      padding:30px;
      margin-bottom:25px;
      text-align:center;
    }

    h1 {
      font-size:34px;
      margin:10px 0;
    }

    .subtitle {
      font-weight:bold;
      margin-bottom:20px;
    }

    iframe {
      width:85%;
      height:330px;
      border:none;
      background:#111;
    }

    .stats {
      display:flex;
      justify-content:space-around;
      flex-wrap:wrap;
      margin-top:20px;
      gap:15px;
    }

    .stat {
      min-width:120px;
      font-size:15px;
    }

    table {
      width:85%;
      margin:20px auto 0;
      border-collapse:collapse;
    }

    th, td {
      padding:12px;
      text-align:center;
    }

    th {
      background:#111;
    }

    td {
      background:#4a4f56;
    }

    a {
      color:white;
    }

    .back {
      display:inline-block;
      margin-bottom:15px;
      color:white;
      text-decoration:none;
      font-weight:bold;
    }

    .empty {
      color:#ccc;
      font-style:italic;
    }

    @media(max-width:700px){
      iframe {
        width:100%;
        height:230px;
      }

      table {
        width:100%;
      }

      h1 {
        font-size:26px;
      }
    }
  </style>
</head>

<body>

<header>Challenge List</header>

<div class="main-list">
  <a href="index.html">Main List</a>
</div>

<div class="container">

  <a class="back" href="index.html">← Back to list</a>

  <div id="challenge"></div>

</div>

<script src="levels.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = Number(params.get("id"));

const level = levels.find(l => l.placement === id);
const container = document.getElementById("challenge");

if (!level) {
  container.innerHTML = `
    <div class="box">
      <h1>Challenge not found</h1>
      <p>This level does not exist.</p>
    </div>
  `;
} else {
  level.records.sort((a, b) => b.percent - a.percent);

  container.innerHTML = `
    <div class="box">
      <h1>${level.name} ❯</h1>
      <div class="subtitle">by ${level.creator}, verified by ${level.verifier}</div>

      <iframe 
        src="https://www.youtube.com/embed/${level.video}" 
        allowfullscreen>
      </iframe>

      <div class="stats">
        <div class="stat">
          <b>Level ID:</b><br>
          ${level.levelId}
        </div>

        <div class="stat">
          <b>Points Awarded</b><br>
          ${level.points}
        </div>

        <div class="stat">
          <b>FPS</b><br>
          ${level.fps}
        </div>

        <div class="stat">
          <b>TPS</b><br>
          ${level.tps}
        </div>
      </div>
    </div>

    <div class="box">
      <h2>Records</h2>
      <p><b>100% or better required to qualify</b></p>
      <p>${level.records.length} completions overall registered.</p>

      ${
        level.records.length === 0
        ? `<p class="empty">No records yet.</p>`
        : `
          <table>
            <tr>
              <th>Record Holder</th>
              <th>Percent</th>
              <th>Video Proof</th>
            </tr>

            ${level.records.map(record => `
              <tr>
                <td><b>${record.player}</b></td>
                <td>${record.percent}%</td>
                <td><a href="${record.video}" target="_blank">YouTube ↗</a></td>
              </tr>
            `).join("")}
          </table>
        `
      }
    </div>
  `;
}
</script>

</body>
</html>
