<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Profile</title>

  <style>
    body {
      font-family: Arial;
      background:#2c2f33;
      color:white;
      margin:0;
    }

    header {
      background:#23272a;
      padding:20px;
      text-align:center;
    }

    .container {
      width:90%;
      max-width:1000px;
      margin:20px auto;
    }

    .box {
      background:#40444b;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:10px;
    }

    th { background:#202225; }
    tr:nth-child(even){ background:#2f3136; }

    a { color:lightblue; }
  </style>
</head>

<body>

<header>
  Player Profile
</header>

<div class="container">

  <div id="profile"></div>

</div>

<script src="levels.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

const profile = document.getElementById("profile");

let records = [];
let points = 0;

levels.forEach(level => {
  level.records.forEach(r => {
    if (r.player === name) {
      records.push({
        level: level.name,
        percent: r.percent,
        video: r.video
      });

      if (r.percent === 100) {
        points += level.points;
      }
    }
  });
});

profile.innerHTML = `
  <div class="box">
    <h2>${name}</h2>
    <p><b>Points:</b> ${points}</p>
  </div>

  <div class="box">
    <h3>Records</h3>

    ${
      records.length === 0
      ? "<p>No records</p>"
      : `
        <table>
          <tr>
            <th>Level</th>
            <th>%</th>
            <th>Video</th>
          </tr>

          ${records.map(r => `
            <tr>
              <td>${r.level}</td>
              <td>${r.percent}%</td>
              <td><a href="${r.video}" target="_blank">Watch</a></td>
            </tr>
          `).join("")}
        `
    }
  </div>
`;
</script>

</body>
</html>
